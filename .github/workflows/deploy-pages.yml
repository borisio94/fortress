name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [main]
  # Permet aussi un déclenchement manuel depuis l'onglet Actions du repo.
  workflow_dispatch:

# Permissions minimales requises par actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; les pushes successifs sont mis en file
# d'attente sans annuler le déploiement en cours (cancel-in-progress: false).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Flutter web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      # --base-href doit matcher le sous-chemin GitHub Pages du repo.
      # Le repo s'appelle "fortress" → URL servie sur
      # https://<user>.github.io/fortress/ → base href "/fortress/".
      # Si vous renommez le repo, mettez à jour cette valeur.
      - name: Build web (release)
        run: flutter build web --release --base-href "/fortress/"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
