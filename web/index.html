<!DOCTYPE html>
<html lang="fr">
<head>
  <!--
    Le placeholder $FLUTTER_BASE_HREF est remplacé au build par la valeur
    passée à `flutter build web --base-href "..."`.
      - Build local par défaut         → "/"
      - GitHub Actions (production)    → "/fortress/" (cf. workflow CI)
    Ne PAS coder en dur "/fortress/" ici, sinon `flutter run -d chrome`
    casse en dev.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Fortress POS — caisse multi-boutique pour commerçants.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Fortress POS">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Fortress POS</title>
  <link rel="manifest" href="manifest.json">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#534AB7">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
